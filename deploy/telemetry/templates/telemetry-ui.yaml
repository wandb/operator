      dashboards: grafana
  datasources:
    - inputName: DS_VICTORIAMETRICS
      datasourceName: VictoriaMetrics
    - inputName: DS_VICTORIATRACES
      datasourceName: VictoriaTraces
  json: |-
{{ .Files.Get "dashboards/wandb-field-investigation.json" | nindent 4 }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: wandb-managed-install-performance
  namespace: {{ include "telemetry.namespace" . }}
  labels:
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: wandb
spec:
  uid: wandb-managed-install-performance
  folder: W&B
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_VICTORIAMETRICS
      datasourceName: VictoriaMetrics
    - inputName: DS_VICTORIATRACES
      datasourceName: VictoriaTraces
  json: |-
{{ .Files.Get "dashboards/wandb-managed-install-performance.json" | nindent 4 }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: wandb-graphql-errors
  namespace: {{ include "telemetry.namespace" . }}
  labels:
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: wandb
spec:
  uid: wandb-graphql-errors
  folder: W&B
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_VICTORIAMETRICS
      datasourceName: VictoriaMetrics
    - inputName: DS_VICTORIATRACES
      datasourceName: VictoriaTraces
    - inputName: DS_VICTORIALOGS
      datasourceName: VictoriaLogs
  json: |-
{{ .Files.Get "dashboards/wandb-graphql-errors.json" | nindent 4 }}
{{- range $dashboard := list "wandb-api" "wandb-ingest" "wandb-run-data" "wandb-artifacts" "wandb-jobs" "wandb-datastores" }}
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: {{ $dashboard }}
  namespace: {{ include "telemetry.namespace" $ }}
  labels:
    app.kubernetes.io/component: telemetry
    app.kubernetes.io/part-of: wandb
spec:
  uid: {{ $dashboard }}
  folder: W&B
  instanceSelector:
    matchLabels:
      dashboards: grafana
  datasources:
    - inputName: DS_VICTORIAMETRICS
      datasourceName: VictoriaMetrics
    - inputName: DS_VICTORIATRACES
      datasourceName: VictoriaTraces
  json: |-
{{ $.Files.Get (printf "dashboards/%s.json" $dashboard) | nindent 4 }}
{{- end }}
{{- end }}
