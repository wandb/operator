{{- if not (eq (index .Values "wandb-operator" "enabled") false) }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .Release.Name }}-serving-cert
  namespace: {{ .Release.Namespace }}
spec:
  dnsNames:
    {{ if (dig "wandb-operator" "service" "name" "" .Values.AsMap) }}
    - {{ dig "wandb-operator" "service" "name" "" .Values.AsMap }}.{{ .Release.Namespace }}.svc
    - {{ dig "wandb-operator" "service" "name" "" .Values.AsMap }}.{{ .Release.Namespace }}.svc.cluster.local
    {{ else }}
    - {{ .Release.Name }}-wandb-operator.{{ .Release.Namespace }}.svc
    - {{ .Release.Name }}-wandb-operator.{{ .Release.Namespace }}.svc.cluster.local
    {{ end }}
  issuerRef:
    kind: Issuer
    name: {{ .Release.Name }}-selfsigned-issuer
  secretName: {{ .Release.Name }}-serving-cert
---
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: {{ .Release.Name }}-selfsigned-issuer
  namespace: {{ .Release.Namespace }}
spec:
  selfSigned: {}
{{- end }}