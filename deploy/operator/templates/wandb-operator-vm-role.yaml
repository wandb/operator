{{- if ne (default "off" .Values.telemetry.mode) "off" }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-vm
rules:
  - apiGroups:
      - operator.victoriametrics.com
    resources:
      - vmagents
      - vmalerts
      - vmnodescrapes
      - vmpodscrapes
      - vmrules
      - vmservicescrapes
      - vmsingles
      - vlsingles
      - vtsingles
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - operator.victoriametrics.com
    resources:
      - vmagents/status
      - vmalerts/status
      - vmsingles/status
      - vlsingles/status
      - vtsingles/status
    verbs:
      - get
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-vm
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-vm
subjects:
  - kind: ServiceAccount
    name: {{ if (dig "wandb-operator" "serviceAccount" "name" "" .Values.AsMap) }}{{ dig "wandb-operator" "serviceAccount" "name" "" .Values.AsMap }}{{ else }}{{ .Release.Name }}-wandb-operator{{ end }}
    namespace: {{ .Release.Namespace }}
{{- end }}
