apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-mysql
rules:
  - apiGroups:
      - moco.cybozu.com
    resources:
      - mysqlclusters
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - moco.cybozu.com
    resources:
      - mysqlclusters/status
    verbs:
      - get
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-mysql
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-mysql
subjects:
  - kind: ServiceAccount
    name: {{ if (dig "wandb-operator" "serviceAccount" "name" "" .Values.AsMap) }}{{ dig "wandb-operator" "serviceAccount" "name" "" .Values.AsMap }}{{ else }}{{ .Release.Name }}-wandb-operator{{ end }}
    namespace: {{ .Release.Namespace }}
