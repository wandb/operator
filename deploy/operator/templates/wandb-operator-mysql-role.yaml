{{- if (dig "wandb-operator" "enabled" true .Values.AsMap) }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-mysql
rules:
  - apiGroups:
      - moco.cybozu.com
    resources:
      - mysqlclusters
    verbs:
      - create
      - delete
      - get
      - list
      - patch
      - update
      - watch
  - apiGroups:
      - moco.cybozu.com
    resources:
      - mysqlclusters/status
    verbs:
      - get
      - patch
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-mysql
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-mysql
subjects:
  - kind: ServiceAccount
    name: {{ include "wandb-operator.fullname" . }}
    namespace: {{ .Release.Namespace }}
{{- end }}