wandb:
  install: true
  size: small
  namespace: wandb
  version: 0.78.0-pre-operator-v2-no-app.1
  internalServiceAuth: false

wandb-operator:
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/operator
    tag: internal-testing.3
  containers:
    operator:
      command:
        - /manager
      args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/wandb-operator/serving-certs
      ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
      env:
        METRICS_BIND_ADDRESS:
          value: ":8443"
        METRICS_SECURE:
          value: "false"
        TELEMETRY_ENABLED:
          value: "{{ .Values.telemetry.enabled }}"
        TELEMETRY_MODE:
          value: "{{ .Values.telemetry.mode }}"
        TELEMETRY_METRICS_ENDPOINT:
          value: "{{ .Values.telemetry.external.metricsEndpoint }}"
        TELEMETRY_LOGS_ENDPOINT:
          value: "{{ .Values.telemetry.external.logsEndpoint }}"
        TELEMETRY_TRACES_ENDPOINT:
          value: "{{ .Values.telemetry.external.tracesEndpoint }}"
        TELEMETRY_MANAGED_NAMESPACE:
          value: "{{ .Values.telemetry.namespace }}"
        TELEMETRY_MANAGED_VMSINGLE_NAME:
          value: "{{ .Values.telemetry.managed.vmsingle.name }}"
        TELEMETRY_MANAGED_VLSINGLE_NAME:
          value: "{{ .Values.telemetry.managed.vlsingle.name }}"
        TELEMETRY_MANAGED_VTSINGLE_NAME:
          value: "{{ .Values.telemetry.managed.vtsingle.name }}"
        TELEMETRY_MANAGED_OTLP_GATEWAY_ENABLED:
          value: "{{ .Values.telemetry.managed.otlpGateway.enabled }}"
        TELEMETRY_MANAGED_OTLP_GATEWAY_NAME:
          value: "{{ .Values.telemetry.managed.otlpGateway.name }}"
        TELEMETRY_MANAGED_OTLP_GATEWAY_HTTP_PORT:
          value: "{{ .Values.telemetry.managed.otlpGateway.service.httpPort }}"
        TELEMETRY_OTEL_SECRET_NAME:
          value: "{{ .Values.telemetry.otel.secretName }}"
        TELEMETRY_OTEL_PROTOCOL:
          value: "{{ .Values.telemetry.otel.protocol }}"
        TELEMETRY_OTEL_SERVICE_NAME:
          value: "{{ .Values.telemetry.otel.serviceName }}"
        TELEMETRY_OTEL_RESOURCE_ATTRIBUTES:
          value: "{{ .Values.telemetry.otel.resourceAttributes }}"
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8081
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 64Mi
      volumeMounts:
        - mountPath: /tmp/wandb-operator/serving-certs
          name: serving-certs
          readOnly: true

  service:
    enabled: true
    ports:
      - name: webhook
        port: 443
        protocol: TCP
        targetPort: 9443
      - name: metrics
        port: 8443
        protocol: TCP
        targetPort: 8443
  replicaCount: 1
  securityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: serving-certs
      secret:
        secretName: '{{ .Release.Name }}-serving-cert'

  operators:
    application: true
    clickhouse: true
    grafana: true
    kafka: true
    minio: true
    mysql: true
    redis: true
    vm: true

  telemetry:
    enabled: false
    mode: managed
    namespace: wandb
    external:
      metricsEndpoint: ""
      logsEndpoint: ""
      tracesEndpoint: ""
    managed:
      vmsingle:
        name: victoria-instance
      vlsingle:
        name: victoria-logs
      vtsingle:
        name: victoria-traces
      otlpGateway:
        enabled: true
        name: victoria-otlp-gateway
        service:
          httpPort: 4318
    otel:
      secretName: wandb-otel-connection
      protocol: http/protobuf
      serviceName: wandb-service
      resourceAttributes: deployment.environment=dev

mysql-operator:
  install: true

redis-operator:
  install: true

strimzi-kafka-operator:
  install: true
  watchAnyNamespace: true

minio-operator:
  install: true

altinity-clickhouse-operator:
  install: true
  configs:
    files:
      config.yaml:
        watch:
          namespaces: [".*"]

victoria-metrics-operator:
  install: true

grafana-operator:
  install: true

telemetry:
  enabled: false
  mode: managed
  namespace: ""
  otel:
    secretName: wandb-otel-connection
    protocol: http/protobuf
    serviceName: wandb-service
    resourceAttributes: deployment.environment=dev
  external:
    metricsEndpoint: ""
    logsEndpoint: ""
    tracesEndpoint: ""
  managed:
    retentionPeriod: 1d
    vmsingle:
      name: victoria-instance
      extraArgs:
        opentelemetry.usePrometheusNaming: "true"
    vmagent:
      name: victoria-agent
      selectAllByDefault: true
    vlsingle:
      name: victoria-logs
    vtsingle:
      name: victoria-traces
    otlpGateway:
      enabled: true
      name: victoria-otlp-gateway
      image:
        repository: otel/opentelemetry-collector-contrib
        tag: 0.102.1
        pullPolicy: IfNotPresent
      service:
        grpcPort: 4317
        httpPort: 4318
        metricsPort: 8888
      resources: {}
  scrape:
    enabled: true
    kubeletCadvisor: true
    operators: true
    wandbApi: true
    infrastructure: true
  alerting:
    enabled: false
    evaluationInterval: 30s
    notifier:
      enabled: false
      name: default
      type: webhook
      target: http://alertmanager-operated.monitoring.svc:9093
  perses:
    enabled: false
    image:
      repository: ghcr.io/perses/perses
      tag: v0.52.0
      pullPolicy: IfNotPresent
    service:
      port: 8080
  ui:
    grafana:
      enabled: false
    vmui:
      enabled: false
