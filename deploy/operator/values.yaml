wandb:
  install: true
  size: small
  namespace: wandb
  version: 0.78.0-pre-operator-v2-no-app.1
  internalServiceAuth: false

wandb-operator:
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/operator
    tag: dpanzella-test.0
  containers:
    operator:
      command:
        - /manager
      args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/wandb-operator/serving-certs
      ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
      env:
        METRICS_BIND_ADDRESS:
          value: ":8443"
        METRICS_SECURE:
          value: "false"
        GATEWAY_API_ENABLED:
          value: "{{ .Values.gatewayAPI.enabled }}"
        TELEMETRY_ENABLED:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_ENABLED
        TELEMETRY_MANAGED_NAMESPACE:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_MANAGED_NAMESPACE
        TELEMETRY_OTEL_SECRET_NAME:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_OTEL_SECRET_NAME
        TELEMETRY_OTEL_PROTOCOL:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_OTEL_PROTOCOL
        TELEMETRY_OTEL_SERVICE_NAME:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_OTEL_SERVICE_NAME
        TELEMETRY_OTEL_RESOURCE_ATTRIBUTES:
          valueFrom:
            configMapKeyRef:
              name: '{{ .Release.Name }}-telemetry-config'
              key: TELEMETRY_OTEL_RESOURCE_ATTRIBUTES
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8081
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 64Mi
      volumeMounts:
        - mountPath: /tmp/wandb-operator/serving-certs
          name: serving-certs
          readOnly: true

  service:
    enabled: true
    ports:
      - name: webhook
        port: 443
        protocol: TCP
        targetPort: 9443
      - name: metrics
        port: 8443
        protocol: TCP
        targetPort: 8443
  replicaCount: 1
  securityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: serving-certs
      secret:
        secretName: '{{ .Release.Name }}-serving-cert'

  operators:
    application: true
    clickhouse: true
    grafana: true
    kafka: true
    objectStore: true
    mysql: true
    redis: true
    vm: true

  gatewayAPI:
    enabled: false

mysql-operator:
  install: true

redis-operator:
  install: true

strimzi-kafka-operator:
  install: true
  watchAnyNamespace: true

minio-operator:
  install: true

altinity-clickhouse-operator:
  install: true
  configs:
    files:
      config.yaml:
        watch:
          namespaces: [".*"]

victoria-metrics-operator:
  # Helm dependency conditions are boolean-only, so full/forward installs
  # must opt into this dependency explicitly or via a preset values file.
  enabled: false

grafana-operator:
  # Helm dependency conditions are boolean-only, so full installs
  # must opt into this dependency explicitly or via a preset values file.
  enabled: false

telemetry:
  # off: disable telemetry collection
  # full: run the in-cluster Victoria stack and local Grafana
  # forward: run the in-cluster Victoria stack and forward OTLP data externally
  mode: "off"
  namespace: wandb
  otel:
    secretName: wandb-otel-connection
    protocol: http/protobuf
    serviceName: wandb-service
    resourceAttributes: ""
  forwarding:
    otlp:
      endpoint: ""
      protocol: http/protobuf
      headers: {}
      tls:
        insecure: false
  retentionPeriod: 1d
  scrape:
    enabled: true
    kubeletCadvisor: true
    operators: true
    wandbApi: true
    infrastructure: true
  alerting:
    enabled: false
    evaluationInterval: 30s
    notifier:
      enabled: false
      name: default
      type: webhook
      target: http://alertmanager-operated.monitoring.svc:9093
