wandb:
  install: true
  size: small
  namespace: wandb
  version: 0.78.0-pre-operator-v2-no-app.1
  internalServiceAuth: false

wandb-operator:
  image:
    repository: us-docker.pkg.dev/wandb-production/public/wandb/operator
    tag: internal-testing.3
  containers:
    operator:
      command:
        - /manager
      args:
        - --metrics-bind-address=:8443
        - --leader-elect
        - --health-probe-bind-address=:8081
        - --webhook-cert-path=/tmp/wandb-operator/serving-certs
      ports:
        - containerPort: 8443
          name: metrics
          protocol: TCP
      env:
        METRICS_BIND_ADDRESS:
          value: ":8443"
        METRICS_SECURE:
          value: "false"
        TELEMETRY_ENABLED:
          value: "{{ .Values.telemetry.enabled }}"
        TELEMETRY_MANAGED_NAMESPACE:
          value: "{{ .Values.telemetry.namespace }}"
        TELEMETRY_OTEL_SECRET_NAME:
          value: '{{ (index .Values "wandb-operator").telemetry.otel.secretName }}'
        TELEMETRY_OTEL_PROTOCOL:
          value: '{{ (index .Values "wandb-operator").telemetry.otel.protocol }}'
        TELEMETRY_OTEL_SERVICE_NAME:
          value: '{{ (index .Values "wandb-operator").telemetry.otel.serviceName }}'
        TELEMETRY_OTEL_RESOURCE_ATTRIBUTES:
          value: '{{ (index .Values "wandb-operator").telemetry.otel.resourceAttributes }}'
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - "ALL"
      livenessProbe:
        httpGet:
          path: /healthz
          port: 8081
        initialDelaySeconds: 15
        periodSeconds: 20
      readinessProbe:
        httpGet:
          path: /readyz
          port: 8081
        initialDelaySeconds: 5
        periodSeconds: 10
      resources:
        limits:
          cpu: 500m
          memory: 512Mi
        requests:
          cpu: 10m
          memory: 64Mi
      volumeMounts:
        - mountPath: /tmp/wandb-operator/serving-certs
          name: serving-certs
          readOnly: true

  service:
    enabled: true
    ports:
      - name: webhook
        port: 443
        protocol: TCP
        targetPort: 9443
      - name: metrics
        port: 8443
        protocol: TCP
        targetPort: 8443
  replicaCount: 1
  securityContext:
    runAsNonRoot: false
    seccompProfile:
      type: RuntimeDefault
  volumes:
    - name: serving-certs
      secret:
        secretName: '{{ .Release.Name }}-serving-cert'

  operators:
    application: true
    clickhouse: true
    grafana: true
    kafka: true
    minio: true
    mysql: true
    redis: true
    vm: true

  telemetry:
    otel:
      secretName: wandb-otel-connection
      protocol: http/protobuf
      serviceName: wandb-service
      resourceAttributes: deployment.environment=dev

mysql-operator:
  install: true

redis-operator:
  install: true

strimzi-kafka-operator:
  install: true
  watchAnyNamespace: true

minio-operator:
  install: true

altinity-clickhouse-operator:
  install: true
  configs:
    files:
      config.yaml:
        watch:
          namespaces: [".*"]

victoria-metrics-operator:
  enabled: true

grafana-operator:
  enabled: true

telemetry:
  enabled: false
  namespace: ""
  retentionPeriod: 1d
  scrape:
    enabled: true
    kubeletCadvisor: true
    operators: true
    wandbApi: true
    infrastructure: true
  alerting:
    enabled: false
    evaluationInterval: 30s
    notifier:
      enabled: false
      name: default
      type: webhook
      target: http://alertmanager-operated.monitoring.svc:9093
