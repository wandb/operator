# Sample Helm values for deploying the W&B operator on OpenShift with restricted-v2 SCC.
#
# Usage:
#   helm install wandb-operator ./deploy/operator \
#     --values ./deploy/operator/profiles/openshift.yaml \
#     --values ./deploy/operator/profiles/openshift-values-sample.yaml \
#     --namespace wandb-operators --create-namespace

# External MySQL is required — mysql-operator is not compatible with OpenShift.
# Deploy MySQL separately and configure the connection here.
wandb-base:
  mysql:
    managedMysql: null
    externalMysql:
      host: mysql.wandb.svc.cluster.local
      port: 3306
      database: wandb_local
      user: wandb
      passwordSecretRef:
        name: wandb-external-mysql
        key: MYSQL_PASSWORD

  # Security contexts for managed infrastructure (applied via the WandB CR spec).
  # These are passed through to vendor operator CRs (Redis, Minio, Kafka, ClickHouse).
  redis:
    managedRedis:
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

  objectStore:
    managedObjectStore:
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

  kafka:
    managedKafka:
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

  clickhouse:
    managedClickhouse:
      podSecurityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
