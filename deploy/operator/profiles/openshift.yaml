wandb-operator:
  podSecurityContext:
    runAsUser: null
    runAsGroup: null
    fsGroup: null
    fsGroupChangePolicy: null

  containers:
    operator:
      # readOnlyRootFilesystem blocks Tilt live_update binary sync under restricted-v2
      securityContext:
        readOnlyRootFilesystem: false
      env:
        OPENSHIFT:
          value: "true"

grafana-operator:
  isOpenShift: true

# OpenShift ships monitoring.coreos.com CRDs; disable Helm-managed copies to avoid field-manager conflicts
prometheus-operator-crds:
  enabled: false

# seaweedfs-operator defaults hardcode UID/GID 65532, which restricted-v2 rejects
seaweedfs-operator:
  podSecurityContext:
    runAsNonRoot: true
    runAsUser: null
    fsGroup: null
    seccompProfile:
      type: RuntimeDefault

# BaselinePodSecurityProvider injects fixed UID/GID 1001; restricted provider lets the platform assign them
strimzi-kafka-operator:
  extraEnvs:
    - name: STRIMZI_POD_SECURITY_PROVIDER_CLASS
      value: restricted

# Local CRC images for in-development moco UID/SCC fixes; remove once upstream chart ships them
moco:
  image:
    repository: image-registry.openshift-image-registry.svc:5000/wandb-operators/moco-controller
    tag: dev
    pullPolicy: Always
  fluentbit:
    image:
      repository: image-registry.openshift-image-registry.svc:5000/wandb-operators/moco-fluent-bit
      tag: dev
