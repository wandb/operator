wandb-operator:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault

  containers:
    operator:
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL

grafana-operator:
  isOpenShift: true

minio-operator:
  operator:
    env:
      - name: OPERATOR_STS_ENABLED
        value: "on"
      - name: MINIO_OPERATOR_RUNTIME
        value: "OpenShift"
    securityContext:
      runAsUser: null
      runAsGroup: null
      fsGroup: null
    containerSecurityContext:
      runAsUser: null
      runAsGroup: null
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL

mysql-operator:
  enabled: false

redis-operator:
  podSecurityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
