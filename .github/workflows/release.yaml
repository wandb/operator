name: Release v2

on:
  push:
    tags:
      - "v2.*.*"

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-v2
  cancel-in-progress: false

env:
  CHART_REPOSITORY: us-docker.pkg.dev/wandb-production/public/wandb/charts
  IMAGE_REPOSITORY: us-docker.pkg.dev/wandb-production/public/wandb/operator

jobs:
  release:
    name: Release v2
    if: github.repository_owner == 'wandb'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release tag
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - name: Validate tag and release versions
        id: release
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if [[ ! "${tag}" =~ ^v2\.([0-9]+)\.([0-9]+)(\-.*)?$ ]]; then
            echo "Expected a stable v2 tag in the form v2.x.y; got ${tag}" >&2
            exit 1
          fi

          git fetch  --no-tags --force origin "refs/tags/${tag}:refs/tags/${tag}"

          if [[ "$(git cat-file -t "refs/tags/${tag}")" != "tag" ]]; then
            echo "Release tag ${tag} must be annotated" >&2
            exit 1
          fi

          git fetch --no-tags --force origin refs/heads/main:refs/remotes/origin/main

          tagged_commit="$(git rev-list -n 1 "${tag}")"
          if ! git merge-base --is-ancestor "${tagged_commit}" refs/remotes/origin/main; then
            echo "Tagged commit ${tagged_commit} is not reachable from origin/main" >&2
            exit 1
          fi

          version="${tag#v}"
          chart_version="$(awk '$1 == "version:" { print $2; exit }' deploy/operator/Chart.yaml | tr -d '\"')"
          app_version="$(awk '$1 == "appVersion:" { print $2; exit }' deploy/operator/Chart.yaml | tr -d '\"')"
          image_tag="$(awk '
            $0 == "wandb-operator:" { in_operator = 1; next }
            in_operator && $0 == "  image:" { in_image = 1; next }
            in_image && $1 == "tag:" { print $2; exit }
          ' deploy/operator/values.yaml | tr -d '\"')"

          for value in "${chart_version}" "${app_version}" "${image_tag}"; do
            if [[ "${value}" != "${version}" ]]; then
              echo "Chart version, appVersion, and operator image tag must all equal ${version}" >&2
              echo "Found chart=${chart_version}, appVersion=${app_version}, image=${image_tag}" >&2
              exit 1
            fi
          done

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "tagged_commit=${tagged_commit}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4
        with:
          version: v3.19.0

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          create_credentials_file: 'true'
          token_format: access_token
          project_id: wandb-production
          workload_identity_provider: ${{ secrets.CI_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.CI_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Authorize Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Reject existing production artifacts
        env:
          VERSION: ${{ steps.release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          assert_absent() {
            local artifact=$1
            local output
            local status

            set +e
            output="$(gcloud artifacts docker images describe "${artifact}" --format='value(image_summary.digest)' 2>&1)"
            status=$?
            set -e

            if [[ ${status} -eq 0 ]]; then
              echo "Refusing to overwrite existing artifact ${artifact}" >&2
              exit 1
            fi
            if ! grep -Eqi 'NOT_FOUND|not found' <<< "${output}"; then
              echo "Could not safely determine whether ${artifact} exists:" >&2
              echo "${output}" >&2
              exit 1
            fi
          }

          assert_absent "${IMAGE_REPOSITORY}:${VERSION}"
          assert_absent "${CHART_REPOSITORY}/operator:${VERSION}"

      - name: Build and publish image
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: make docker-build docker-push IMG="${IMAGE_REPOSITORY}:${VERSION}"

      - name: Install chart-testing
        uses: helm/chart-testing-action@6ec842c01de15ebb84c8627d2744a0c2f2755c9f # v2.8.0
        with:
          version: v3.14.0

      - name: Lint charts
        run: ct lint --all --config deploy/ct.yaml

      - name: Package and publish chart
        env:
          VERSION: ${{ steps.release.outputs.version }}
        run: |
          set -euo pipefail
          helm dependency build deploy/operator
          mkdir -p dist
          helm package deploy/operator --destination dist
          helm push "dist/operator-${VERSION}.tgz" "oci://${CHART_REPOSITORY}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.release.outputs.tag }}
          TAGGED_COMMIT: ${{ steps.release.outputs.tagged_commit }}
        run: |
          gh release create "${TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --target "${TAGGED_COMMIT}" \
            --verify-tag \
            --generate-notes \
            --title "${TAG}"
