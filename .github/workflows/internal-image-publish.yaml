name: Internal Image Publish

on:
  workflow_dispatch:
    inputs:
      image_tag:
        type: string
        description: 'Development tag in the form dev-<name>-<7-to-40-character-sha>'
        required: true

jobs:
  release:
    name: Publish development image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Validate development tag
        env:
          VERSION: ${{ inputs.image_tag }}
        run: |
          if [[ ! "${VERSION}" =~ ^dev-[a-z0-9][a-z0-9._-]*-[0-9a-f]{7,40}$ ]]; then
            echo "Development tags must use dev-<name>-<7-to-40-character-sha>" >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          create_credentials_file: 'true'
          token_format: access_token
          project_id: wandb-production
          workload_identity_provider: ${{ secrets.CI_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.CI_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Authorize Docker for Artifact Registry
        run: gcloud auth configure-docker us-docker.pkg.dev --quiet

      - name: Build and publish development image
        env:
          IMAGE_REPOSITORY: us-docker.pkg.dev/wandb-production/public/wandb/operator
          VERSION: ${{ inputs.image_tag }}
        run: make docker-build docker-push IMG="${IMAGE_REPOSITORY}:${VERSION}"
