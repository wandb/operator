{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.redis.secret.name }}
  labels:
    {{- include "test-infra.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
type: Opaque
stringData:
  Host: {{ include "test-infra.redisHost" . | quote }}
  Port: {{ .Values.redis.service.port | quote }}
  Password: {{ .Values.redis.password | quote }}
{{- end }}
