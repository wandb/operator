{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.redis.service.name }}
  labels:
    {{- include "test-infra.componentLabels" (dict "root" . "component" "redis") | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        {{- include "test-infra.componentLabels" (dict "root" . "component" "redis") | nindent 8 }}
    spec:
      containers:
        - name: redis
          image: {{ .Values.redis.image }}
          imagePullPolicy: IfNotPresent
          {{- if include "test-infra.redisTLS" . }}
          command:
            - /bin/sh
            - -c
          args:
            - >
              exec redis-server
              --port 0
              --tls-port {{ .Values.redis.service.port }}
              --tls-cert-file /etc/redis/tls/tls.crt
              --tls-key-file /etc/redis/tls/tls.key
              --tls-ca-cert-file /etc/redis/tls/ca.crt
              --tls-auth-clients no{{- if .Values.redis.password }} --requirepass "$REDIS_PASSWORD"{{- end }}
          {{- else if .Values.redis.password }}
          command:
            - /bin/sh
            - -c
            - exec redis-server --requirepass "$REDIS_PASSWORD"
          {{- else }}
          args: ["redis-server"]
          {{- end }}
          {{- if .Values.redis.password }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.redis.secret.name }}
                  key: Password
          {{- end }}
          ports:
            - name: redis
              containerPort: 6379
          readinessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 6379
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
            {{- if include "test-infra.redisTLS" . }}
            - name: tls
              mountPath: /etc/redis/tls
              readOnly: true
            {{- end }}
      volumes:
        - name: data
          emptyDir: {}
        {{- if include "test-infra.redisTLS" . }}
        - name: tls
          secret:
            secretName: {{ .Values.redis.tls.secretName }}
        {{- end }}
{{- end }}
