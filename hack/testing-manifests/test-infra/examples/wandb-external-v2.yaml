# v2 WeightsAndBiases CR that wires all three external infra components to the
# Secrets produced by the test-infra helm chart. Apply into the same namespace
# as the chart install so the SecretKeySelector references resolve.
#
# The `URL` field on each connection is intentionally omitted — it's marked
# "generated by operator" in api/v2/weightsandbiases_types.go, so we never
# pre-populate it from the chart's secrets (the chart doesn't emit a `url` key).
---
apiVersion: apps.wandb.com/v2
kind: WeightsAndBiases
metadata:
  name: wandb-external-v2
  namespace: test-infra
spec:
  wandb:
    hostname: http://localhost:8080
    internalServiceAuth:
      enabled: true
    features:
      proxy: true
    version: "0.81.0-rc.1779120597"
  size: dev
  retentionPolicy:
    onDelete: purge
  mysql:
    externalMysql:
      host:
        name: external-mysql-connection
        key: Host
      port:
        name: external-mysql-connection
        key: Port
      database:
        name: external-mysql-connection
        key: Database
      username:
        name: external-mysql-connection
        key: Username
      password:
        name: external-mysql-connection
        key: Password
  redis:
    externalRedis:
      host:
        name: external-redis-connection
        key: Host
      port:
        name: external-redis-connection
        key: Port
  objectStore:
    externalObjectStore:
      endpoint:
        name: external-objectstore-connection
        key: Host
      port:
        name: external-objectstore-connection
        key: Port
      bucket:
        name: external-objectstore-connection
        key: Bucket
      region:
        name: external-objectstore-connection
        key: Region
      accessKey:
        name: external-objectstore-connection
        key: AccessKey
      secretKey:
        name: external-objectstore-connection
        key: SecretKey
  kafka:
    managedKafka:
      telemetry:
        enabled: true
  clickhouse:
    managedClickhouse:
      telemetry:
        enabled: true
