apiVersion: v1
kind: Namespace
metadata:
  name: seaweedfs
  labels:
    name: seaweedfs
---
apiVersion: v1
kind: Pod
metadata:
  labels:
    app: seaweedfs
  name: seaweedfs-s3
  namespace: seaweedfs
spec:
  containers:
    - name: seaweedfs
      image: chrislusf/seaweedfs:4.18
      args:
        - server
        - -s3
        - -dir=/data
      ports:
        - containerPort: 9000
          name: s3
        - containerPort: 9333
          name: master
        - containerPort: 8888
          name: filer
      volumeMounts:
        - mountPath: /data
          name: localvolume
  volumes:
    - name: localvolume
      hostPath:
        path: /mnt/seaweedfs/data
        type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: seaweedfs
spec:
  selector:
    app: seaweedfs
  ports:
    - port: 8333
      name: s3
