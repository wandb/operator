---
requiredOperatorVersion: ^2.0.0
manifestVersion: v1alpha1

features:
  filestreamQueue: false
  proxy: false

bucket:
  default:
    ingress:
      paths:
        - /bucket
      servicePort: "http-minio"
      pathType: Prefix
    sizing:
      default:
        replicas: 1
        pools: 1 # Not implemented yet, but will be needed if we commit to minio
        volumeSize: 10Gi
      micro:
        replicas: 3
        pools: 1
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 1
            memory: 4Gi
      small:
        replicas: 3
        volumeSize: 100Gi
        resources:
          requests:
            cpu: 2
            memory: 8Gi
          limits:
            cpu: 2
            memory: 8Gi

clickhouse:
  default:
    sizing:
      default:
        shards: 1
        replicas: 1
        volumeSize: 10Gi
      micro:
        replicas: 3
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 1
            memory: 4Gi
      small:
        shards: 1
        replicas: 3
        volumeSize: 100Gi
        resources:
          requests:
            cpu: 2
            memory: 8Gi
          limits:
            cpu: 2
            memory: 8Gi

generatedSecrets:
  - name: session-key
    length: 32
    type: password
  - name: weave-worker-auth
    length: 32
    type: password
    useExactName: true

kafka:
  sizing:
    default:
      replicas: 1
      volumeSize: 10Gi
      replicationFactor: 1
      minInSyncReplicas: 1
      offsetsTopicRF: 1
      transactionStateRF: 1
      transactionStateISR: 1
    micro:
      replicas: 3
      volumeSize: 10Gi
      replicationFactor: 3
      minInSyncReplicas: 2
      offsetsTopicRF: 3
      transactionStateRF: 3
      transactionStateISR: 3
      resources:
        requests:
          cpu: 1
          memory: 4Gi
        limits:
          cpu: 1
          memory: 4Gi
    small:
      replicas: 3
      volumeSize: 100Gi
      replicationFactor: 3
      minInSyncReplicas: 2
      offsetsTopicRF: 3
      transactionStateRF: 3
      transactionStateISR: 3
      resources:
        requests:
          cpu: 2
          memory: 8Gi
        limits:
          cpu: 2
          memory: 8Gi
  topics:
    - name: filestream
      features:
        - filestreamQueue
      topic: filestream
      partitionCount: 48
    - name: flat-run-fields-updater
      topic: flat-run-fields-updater
      partitionCount: 48
    - name: weave-worker
      topic: weave.call_ended
      partitionCount: 48
    - name: weave-evaluate-model-worker
      topic: weave.evaluate_model
      partitionCount: 48

mysql:
  default:
    sizing:
      default:
        replicas: 1
        volumeSize: 10Gi
      micro:
        replicas: 2
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 1
            memory: 4Gi
      small:
        replicas: 3
        volumeSize: 100Gi
        resources:
          requests:
            cpu: 2
            memory: 8Gi
          limits:
            cpu: 2
            memory: 8Gi
  metadata: {}
  runs: {}
  usage: {}

redis:
  default:
    sizing:
      default:
        shards: 1
        replicas: 1
        volumeSize: 10Gi
      micro:
        replicas: 2
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 1
            memory: 4Gi
          limits:
            cpu: 1
            memory: 4Gi
      small:
        shards: 1
        replicas: 3
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 2
            memory: 8Gi
          limits:
            cpu: 2
            memory: 8Gi

commonEnvvars:
  gorillaMysql:
    - name: MYSQL
      sources:
        - name: default
          type: moco
    - name: GORILLA_ANALYTICS_SINK
      sources:
        - name: default
          type: moco
    - name: GORILLA_FILE_STREAM_STORE_ADDRESS
      sources:
        - name: default
          type: moco
    - name: GORILLA_METADATA_STORE
      sources:
        - name: metadata
          type: moco
    - name: GORILLA_RUN_STORE
      sources:
        - name: runs
          type: moco
    - name: GORILLA_USAGE_STORE
      sources:
        - name: usage
          type: moco
  gorillaBucket:
    - name: AWS_REGION
      sources:
        - name: default
          type: bucket
          field: region
      defaultValue: "us-east-1"
    - name: BUCKET
      sources:
        - name: default
          type: bucket
    - name: GORILLA_FILE_STORE
      sources:
        - name: default
          type: bucket
    - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_OVERFLOW_BUCKET_STORE
      sources:
        - name: default
          type: bucket
    - name: GORILLA_STORAGE_BUCKET
      sources:
        - name: default
          type: bucket
  gorillaRedis:
    - name: REDIS
      sources:
        - name: default
          type: redis
    - name: GORILLA_ACTIVITY_STORE_CACHE_ADDRESS
      sources:
        - name: default
          type: redis
    - name: GORILLA_AUDITOR_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_FILE_METADATA_SOURCE
      sources:
        - name: default
          type: redis
    - name: GORILLA_LOCKER
      sources:
        - name: default
          type: redis
    - name: GORILLA_METADATA_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_SETTINGS_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_USAGE_METRICS_CACHE
      sources:
        - name: default
          type: redis
  gorillaService:
    - name: GORILLA_SWEEP_PROVIDER
      sources:
        - name: anaconda2
          type: service
          proto: "http"
          path: ""
  gorillaTaskQueueConsumer:
    - name: GORILLA_TASK_QUEUE
      sources:
        - name: taskQueue
          type: redis
          params:
            concurrency: 10
    - name: GORILLA_TASK_QUEUE_WORKER_ENABLED
      value: "true"
  gorillaTaskQueueProducer:
    - name: GORILLA_TASK_QUEUE
      sources:
        - name: taskQueue
          type: redis
    - name: GORILLA_TASK_QUEUE_WORKER_ENABLED
      value: "false"
  gorillaHistoryStore:
    - name: GORILLA_HISTORY_STORE
      sources:
        - name: parquet
          type: service
          port: parquet
          proto: "http"
          path: "/_goRPC_"
        - name: default
          type: moco
    - name: GORILLA_PARQUET_LIVE_HISTORY_STORE
      sources:
        - name: default
          type: moco
  gorillaOnprem:
    - name: GORILLA_LOCAL_SERVICE_BYPASS
      value: "true"
    - name: GORILLA_DEFAULT_REGION
      value: "minio-local"
    - name: GORILLA_EMAIL_SINK
      sources:
        - name: email
          type: custom-resource
          field: status.emailSink
      defaultValue: "https://api.wandb.ai/email/dispatch"
    - name: GORILLA_FILE_METADATA_SOURCE_IS_INTERNAL
      value: "true"
    - name: GORILLA_ONPREM
      value: "true"
    - name: GORILLA_ONPREM_API_KEY_PREFIX
      value: "local"
    - name: GORILLA_STATSD_PORT
      value: "0"
    - name: GORILLA_SESSION_KEY
      sources:
        - name: session-key
          type: generatedSecret
    - name: BUCKET_PROXY
      value: "true"
    - name: GORILLA_GLUE_FILE_STORE_IS_PROXIED
      value: "true"
    - name: GORILLA_FILE_STORE_IS_PROXIED
      value: "true"
    - name: GORILLA_FILE_HOST
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: GORILLA_FRONTEND_HOST
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: LICENSE
      sources:
        - name: license
          type: custom-resource
          field: spec.wandb.license
    - name: GORILLA_LICENSE
      sources:
        - name: license
          type: custom-resource
          field: spec.wandb.license
  gorillaCustomerSecrets:
    - name: GORILLA_CUSTOMER_SECRET_STORE_SOURCE
      value: "k8s-secretmanager://"
    - name: GORILLA_CUSTOMER_SECRET_STORE_K8S_CONFIG_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: GORILLA_INTERNAL_JWT_SUBJECTS_TO_ISSUERS
      sources:
        - name: internal
          type: jwt-issuer-map
  clickhouse:
    - name: WF_CLICKHOUSE_HOST
      sources:
        - name: default
          type: clickhouse
          field: host
    - name: WF_CLICKHOUSE_PORT
      sources:
        - name: default
          type: clickhouse
          field: port
    - name: WF_CLICKHOUSE_USER
      sources:
        - name: default
          type: clickhouse
          field: user
    - name: WF_CLICKHOUSE_PASS
      sources:
        - name: default
          type: clickhouse
          field: password
    - name: WF_CLICKHOUSE_DATABASE
      sources:
        - name: default
          type: clickhouse
          field: database
  kafka:
    - name: KAFKA_BROKER_HOST
      sources:
        - name: default
          type: kafka
          field: host
    - name: KAFKA_BROKER_PORT
      sources:
        - name: default
          type: kafka
          field: port
    - name: KAFKA_URL
      sources:
        - name: default
          type: kafka
          field: url
  weaveTrace:
    - name: WANDB_PUBLIC_BASE_URL
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: WANDB_BASE_URL
      sources:
        - name: api
          type: service
          proto: "http"
          path: "/"
    - name: WF_TRACE_SERVER_URL
      sources:
        - name: weave-trace
          type: service
          proto: "http"
          path: "/traces"
    - name: WEAVE_TRACE_SERVER_BASE_URL
      sources:
        - name: weave-trace
          type: service
          proto: "http"
          path: "/traces"
    - name: API_PATH_PREFIX
      value: "/traces"
    - name: WEAVE_ENABLE_ONLINE_EVAL
      value: "true"
    - name: WEAVE_ENABLE_EVALUATE_MODEL_WORKER
      value: "true"
    - name: WANDB_INTERNAL_SERVICE_TOKEN
      sources:
        - name: weave-worker-auth
          type: generatedSecret
    - name: WANDB_INTERNAL_SERVICE_TOKEN_SECRET_NAME
      value: "weave-worker-auth"
  frontend:
    - name: REACT_APP_HOST
      source:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: REACT_APP_ENVIRONMENT_NAME
      value: "local"
    - name: REACT_APP_ENVIRONMENT_IS_PRIVATE
      value: "true"
    - name: REACT_APP_ANALYTICS_DISABLED
      value: "true"
    - name: WEAVE_TRACES_ENABLED
      value: "true"
    - name: SERVER_FLAG_WEAVE_1_PERCENTAGE
      value: "100"
  flatRunsV2Producer:
    - name: KAFKA_RUNS_V2_TOPIC_NAME
      value: "flat-run-fields-updater"
    - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_ADDR
      value: "$(KAFKA_URL)/$(KAFKA_RUNS_V2_TOPIC_NAME)"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_CREATE_RUN_TABLES
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_CREATE_RUN_STORE
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_SHADOW_RUN_UPDATES
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_DISABLE_READS
      value: "false"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_FLAT_RUNS_MIGRATOR
      value: "true"
  flatRunsV2Consumer:
    - name: KAFKA_RUNS_V2_TOPIC_NAME
      value: "flat-run-fields-updater"
  telemetryOtel:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      sources:
        - type: telemetry
          field: protocol
    - name: OTEL_TRACES_EXPORTER
      sources:
        - type: telemetry
          field: tracesExporter
    - name: OTEL_METRICS_EXPORTER
      sources:
        - type: telemetry
          field: metricsExporter
    - name: OTEL_LOGS_EXPORTER
      sources:
        - type: telemetry
          field: logsExporter
    - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
      sources:
        - type: telemetry
          field: metricsEndpoint
    - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
      sources:
        - type: telemetry
          field: logsEndpoint
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      sources:
        - type: telemetry
          field: tracesEndpoint
    - name: OTEL_SERVICE_NAME
      sources:
        - type: telemetry
          field: serviceName
    - name: OTEL_RESOURCE_ATTRIBUTES
      sources:
        - type: telemetry
          field: resourceAttributes
    - name: GORILLA_TRACER
      sources:
        - type: telemetry
          field: gorillaTracer

commonVolumeMounts:
  internalSigner:
    - mountPath: /vol/env
      name: wandb-internal-signer-root
      source:
        name: wandb-internal-signer
        type: secret

applications:
  anaconda2:
    name: anaconda2
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/anaconda2
      tag: 0.78.0
    containers:
      - name: anaconda2
        ports:
          - containerPort: 8080
            name: anaconda2
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /ping
        readinessProbe:
          httpGet:
            path: /ping
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: anaconda2
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "2"
            memory: 4Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 3
            minReplicas: 2
  api:
    name: api
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaTaskQueueProducer
      - gorillaService
      - gorillaOnprem
      - gorillaCustomerSecrets
      - kafka
      - flatRunsV2Producer
      - telemetryOtel
    env:
      - name: GORILLA_LICENSE_CERT_PATH
        value: "/jwks.json"
      - name: GORILLA_VIEW_SPEC_UPDATER_EXECUTABLE
        value: "/view-spec-updater-linux"
      - name: INTERNAL_SIGNER_KEY_PATH
        value: "/vol/env"
      - name: MIGRATE_RUNS_DB
        sources:
          - name: default
            type: moco
      - name: MIGRATE_USAGE_DB
        sources:
          - name: default
            type: moco
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    containers:
      - name: api
        args:
          - gorilla
        ports:
          - containerPort: 8080
            name: api
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
        readinessProbe:
          httpGet:
            path: /ready
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: api
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "4"
            memory: 8Gi
          requests:
            cpu: "4"
            memory: 8Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 3
            minReplicas: 2
  executor:
    name: executor
    args:
      - executor
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaTaskQueueConsumer
      - gorillaService
      - gorillaOnprem
      - telemetryOtel
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    containers:
      - name: executor
    sizing:
      small:
        resources:
          limits:
            cpu: "4"
            memory: 16Gi
          requests:
            cpu: "4"
            memory: 16Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
  filemeta:
    name: filemeta
    args:
      - filemeta
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - telemetryOtel
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "2"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
  filestream:
    name: filestream
    features:
      - filestreamQueue
    args:
      - filestream
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - telemetryOtel
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    containers:
      - name: filestream
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "2"
            memory: 4Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
  flat-run-fields-updater:
    name: flat-run-fields-updater
    args:
      - flat-run-fields-updater
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - kafka
      - flatRunsV2Consumer
      - telemetryOtel
    env:
      - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_SUBSCRIPTIONS_FLAT_RUN_FIELDS_UPDATER
        value: "$(KAFKA_URL)/$(KAFKA_RUNS_V2_TOPIC_NAME)?consumer_group_id=flat-run-fields-updater"
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    containers:
      - name: flat-run-fields-updater
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "2"
            memory: 4Gi
          requests:
            cpu: "2"
            memory: 4Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 5
            minReplicas: 1
  frontend:
    name: frontend
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/frontend-nginx
      tag: 0.78.0
    commonEnvs:
      - frontend
    env:
      - name: FRONTEND_APP_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_AUTH_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_LOCAL_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_WEAVE_BACKEND
        sources:
          - name: weave
            type: service
            proto: ""
            path: ""
      - name: WEAVE_ENABLED
        value: "true"
      - name: OPERATOR_ENABLED
        value: "true"
    containers:
      - name: frontend
        ports:
          - containerPort: 8080
            name: frontend
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
        readinessProbe:
          httpGet:
            path: /ready
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: frontend
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
      small:
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "2"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 3
            minReplicas: 2
  glue:
    name: glue
    args:
      - glue
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaService
      - gorillaOnprem
      - telemetryOtel
    env:
      - name: GORILLA_LICENSE_CERT_PATH
        value: "/jwks.json"
      - name: GORILLA_VIEW_SPEC_UPDATER_EXECUTABLE
        value: "/view-spec-updater-linux"
      - name: GORILLA_GLUE_TASK_PROVIDER
        value: "memory://"
      - name: GORILLA_GLUE_TASK_CONFIG_PATH
        value: "/gorilla_glue_tasks_local.yaml"
      - name: GORILLA_GLUE_TASK_STORE
        value: "memory://"
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.78.0
    containers:
      - name: glue
    sizing:
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 3Gi
          requests:
            cpu: "1"
            memory: 3Gi
      small:
        resources:
          limits:
            cpu: "2"
            memory: 6Gi
          requests:
            cpu: "2"
            memory: 6Gi
  metric-observer:
    name: metric-observer
    args:
      - metric-observer
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - kafka
      - flatRunsV2Consumer
      - telemetryOtel
    env:
      - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_SUBSCRIPTIONS_METRIC_OBSERVER
