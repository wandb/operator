  nginx-proxy:
    name: nginx-proxy
    features:
      - proxy
    image:
      repository: nginxinc/nginx-unprivileged
      tag: latest
    commonEnvs:
      - telemetryOtel
    env:
      - name: UPSTREAM_FRONTEND
        sources:
          - name: frontend
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_API
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_WEAVE_TRACE
        sources:
          - name: weave-trace
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_WEAVE
        sources:
          - name: weave
            type: service
            proto: ""
            path: ""
      - name: BUCKET_HOST
        sources:
          - name: default
            type: bucket
            field: host
      - name: BUCKET_PORT
        sources:
          - name: default
            type: bucket
            field: port
      - name: UPSTREAM_BUCKET
        value: "$(BUCKET_HOST):$(BUCKET_PORT)"
    files:
      - name: envvar.conf.template
        mountPath: /etc/nginx/templates
        fileName: envvar.conf.template
        inline: |
          upstream frontend {
            server $UPSTREAM_FRONTEND;
          }

          upstream api {
            server $UPSTREAM_API;
          }

          upstream weave_trace {
            server $UPSTREAM_WEAVE_TRACE;
          }

          upstream weave {
            server $UPSTREAM_WEAVE;
          }

          upstream bucket {
            server $UPSTREAM_BUCKET;
          }

          map $host $bucket{
            default $UPSTREAM_BUCKET;
          }
      - name: nginx.conf
        mountPath: /etc/nginx
        fileName: nginx.conf
        inline: |
          worker_processes  auto;

          error_log  /var/log/nginx/error.log notice;
          pid        /tmp/nginx.pid;

          events {
            worker_connections  1024;
          }

          http {

            include /etc/nginx/conf.d/envvar.conf;

            server {
              listen 8080;
              proxy_set_header Host $http_host;
              client_max_body_size 0;
              location / {
                proxy_pass http://frontend;
              }

              location /api {
                proxy_pass http://api;
              }
              location /artifacts {
                proxy_pass http://api;
              }
              location /artifactsV2 {
                proxy_pass http://api;
              }

              location /files {
                proxy_pass http://api;
              }

              location /graphql {
                proxy_pass http://api;
              }

              location /graphql2 {
                proxy_pass http://api;
              }

              location /oidc {
                proxy_pass http://api;
              }

              location /traces {
                proxy_pass http://weave_trace;
              }

              location /weave/ {
                proxy_pass http://weave/;
              }

              location /bucket {
                proxy_ssl_verify off;
                proxy_set_header Host $bucket;
                proxy_pass https://bucket;
              }
            }
          }
    service:
      type: NodePort
      ports:
        - name: http
          port: 8080
          protocol: TCP
    sizing:
      default:
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 4
        resources:
          limits:
            cpu: "2"
            memory: 2Gi
          requests:
            cpu: "2"
            memory: 2Gi
      micro:
        resources:
          limits:
            cpu: "1"
            memory: 2Gi
          requests:
            cpu: "1"
            memory: 2Gi
        autoscaling:
          horizontal:
            enabled: true
            maxReplicas: 2
            minReplicas: 1
