---
requiredOperatorVersion: ^2.0.0

features:
  filestreamQueue: false
  proxy: false

bucket:
  default:
    ingress:
      paths:
        - /bucket
      servicePort: "http-minio"
      pathType: Prefix
    images:
      seaweedfs:
        registry: "docker.io"
        repository: "chrislusf/seaweedfs"
        tag: "4.35"

clickhouse:
  default:
    images:
      server:
        registry: "docker.io"
        repository: "altinity/clickhouse-server"
        tag: "25.8.16.10002.altinitystable"

clickhouseKeeper:
  default: {}

generatedSecrets:
  - name: session-key
    length: 32
    type: password
  - name: weave-worker-auth
    length: 32
    type: password
    useExactName: true

kafka:
  images:
    bufstream:
      registry: "us-docker.pkg.dev"
      repository: "buf-images-1/buf/images/bufstream"
      tag: "0.4.15"
    etcd:
      registry: "quay.io"
      repository: "coreos/etcd"
      tag: "v3.5.31"
    bucketEnsure:
      repository: "amazon/aws-cli"
      tag: "2.35.10"
  topics:
    - name: filestream
      features:
        - filestreamQueue
      topic: filestream
      partitionCount: 96
    - name: flat-run-fields-updater
      topic: flat-run-fields-updater
      partitionCount: 96
    - name: weave-worker
      topic: weave.call_ended
      partitionCount: 16
    - name: weave-evaluate-model-worker
      topic: weave.evaluate_model
      partitionCount: 16

mysql:
  default:
    images:
      mysql:
        registry: "ghcr.io"
        repository: "cybozu-go/moco/mysql"
        tag: "8.4.8"
      exporter:
        registry: "docker.io"
        repository: "prom/mysqld-exporter"
        tag: "v0.15.1"
  metadata: {}
  runs: {}
  usage: {}

redis:
  default:
    images:
      standalone:
        registry: "quay.io"
        repository: "opstree/redis"
        tag: "v7.0.15"
      replication:
        registry: "quay.io"
        repository: "opstree/redis"
        tag: "v7.0.15"
      sentinel:
        registry: "quay.io"
        repository: "opstree/redis-sentinel"
        tag: "v7.0.12"
      exporter:
        registry: "quay.io"
        repository: "opstree/redis-exporter"
        tag: "v1.44.0"

commonEnvvars:
  gorillaMysql:
    - name: MYSQL
      sources:
        - name: default
          type: mysql
    - name: GORILLA_ANALYTICS_SINK
      sources:
        - name: default
          type: mysql
    - name: GORILLA_FILE_STREAM_STORE_ADDRESS
      sources:
        - name: default
          type: mysql
    - name: GORILLA_METADATA_STORE
      sources:
        - name: metadata
          type: mysql
    - name: GORILLA_RUN_STORE
      sources:
        - name: runs
          type: mysql
    - name: GORILLA_USAGE_STORE
      sources:
        - name: usage
          type: mysql
  gorillaBucket:
    - name: AWS_REGION
      sources:
        - name: default
          type: bucket
          field: region
      defaultValue: "us-east-1"
    - name: BUCKET
      sources:
        - name: default
          type: bucket
    - name: GORILLA_FILE_STORE
      sources:
        - name: default
          type: bucket
    - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_OVERFLOW_BUCKET_STORE
      sources:
        - name: default
          type: bucket
    - name: GORILLA_STORAGE_BUCKET
      sources:
        - name: default
          type: bucket
  gorillaRedis:
    - name: REDIS
      sources:
        - name: default
          type: redis
    - name: GORILLA_ACTIVITY_STORE_CACHE_ADDRESS
      sources:
        - name: default
          type: redis
    - name: GORILLA_AUDITOR_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_FILE_METADATA_SOURCE
      sources:
        - name: default
          type: redis
    - name: GORILLA_LOCKER
      sources:
        - name: default
          type: redis
    - name: GORILLA_METADATA_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_SETTINGS_CACHE
      sources:
        - name: default
          type: redis
    - name: GORILLA_USAGE_METRICS_CACHE
      sources:
        - name: default
          type: redis
  gorillaService:
    - name: GORILLA_SWEEP_PROVIDER
      sources:
        - name: anaconda2
          type: service
          proto: "http"
          path: ""
  gorillaTaskQueueConsumer:
    - name: GORILLA_TASK_QUEUE
      sources:
        - name: taskQueue
          type: redis
          params:
            concurrency: 10
    - name: GORILLA_TASK_QUEUE_WORKER_ENABLED
      value: "true"
  gorillaTaskQueueProducer:
    - name: GORILLA_TASK_QUEUE
      sources:
        - name: taskQueue
          type: redis
    - name: GORILLA_TASK_QUEUE_WORKER_ENABLED
      value: "false"
  gorillaHistoryStore:
    - name: GORILLA_HISTORY_STORE
      sources:
        - name: parquet
          type: service
          port: parquet
          proto: "http"
          path: "/_goRPC_"
        - name: default
          type: mysql
    - name: GORILLA_PARQUET_LIVE_HISTORY_STORE
      sources:
        - name: default
          type: mysql
  gorillaOnprem:
    - name: GORILLA_LOCAL_SERVICE_BYPASS
      value: "true"
    - name: GORILLA_DEFAULT_REGION
      value: "minio-local"
    - name: GORILLA_EMAIL_SINK
      sources:
        - name: email
          type: custom-resource
          field: status.emailSink
      defaultValue: "https://api.wandb.ai/email/dispatch"
    - name: GORILLA_FILE_METADATA_SOURCE_IS_INTERNAL
      value: "true"
    - name: GORILLA_ONPREM
      value: "true"
    - name: GORILLA_ONPREM_API_KEY_PREFIX
      value: "local"
    - name: GORILLA_STATSD_PORT
      value: "0"
    - name: GORILLA_SESSION_KEY
      sources:
        - name: session-key
          type: generatedSecret
    - name: BUCKET_PROXY
      value: "true"
    - name: GORILLA_GLUE_FILE_STORE_IS_PROXIED
      value: "true"
    - name: GORILLA_FILE_STORE_IS_PROXIED
      value: "true"
    - name: GORILLA_FILE_HOST
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: GORILLA_FRONTEND_HOST
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: LICENSE
      sources:
        - name: license
          type: custom-resource
          field: spec.wandb.license
    - name: GORILLA_LICENSE
      sources:
        - name: license
          type: custom-resource
          field: spec.wandb.license
    - name: GORILLA_OIDC_CLIENT_ID
      sources:
        - name: oidc
          type: custom-resource
          field: spec.wandb.oidc.clientId
    - name: GORILLA_OIDC_SECRET
      sources:
        - name: oidc
          type: custom-resource
          field: spec.wandb.oidc.clientSecret
    - name: GORILLA_OIDC_ISSUER
      sources:
        - name: oidc
          type: custom-resource
          field: spec.wandb.oidc.issuerUrl
    - name: GORILLA_AUTH_METHOD
      sources:
        - name: oidc
          type: custom-resource
          field: spec.wandb.oidc.authMethod
    - name: GORILLA_SESSION_LENGTH
      sources:
        - name: oidc
          type: custom-resource
          field: spec.wandb.oidc.sessionLength
      defaultValue: "720h"
  gorillaCustomerSecrets:
    - name: GORILLA_CUSTOMER_SECRET_STORE_SOURCE
      value: "k8s-secretmanager://"
    - name: GORILLA_CUSTOMER_SECRET_STORE_K8S_CONFIG_NAMESPACE
      valueFrom:
        fieldRef:
          fieldPath: metadata.namespace
    - name: GORILLA_INTERNAL_JWT_SUBJECTS_TO_ISSUERS
      sources:
        - name: internal
          type: jwt-issuer-map
  clickhouse:
    - name: WF_CLICKHOUSE_HOST
      sources:
        - name: default
          type: clickhouse
          field: host
    - name: WF_CLICKHOUSE_PORT
      sources:
        - name: default
          type: clickhouse
          field: http-port
    - name: WF_CLICKHOUSE_USER
      sources:
        - name: default
          type: clickhouse
          field: user
    - name: WF_CLICKHOUSE_PASS
      sources:
        - name: default
          type: clickhouse
          field: password
    - name: WF_CLICKHOUSE_DATABASE
      sources:
        - name: default
          type: clickhouse
          field: database
  kafka:
    - name: KAFKA_BROKER_HOST
      sources:
        - name: default
          type: kafka
          field: host
    - name: KAFKA_BROKER_PORT
      sources:
        - name: default
          type: kafka
          field: port
    - name: KAFKA_URL
      sources:
        - name: default
          type: kafka
          field: url
  weaveTrace:
    - name: WANDB_PUBLIC_BASE_URL
      sources:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: WANDB_BASE_URL
      sources:
        - name: api
          type: service
          proto: "http"
          path: "/"
    - name: WF_TRACE_SERVER_URL
      sources:
        - name: weave-trace
          type: service
          proto: "http"
          path: "/traces"
    - name: WEAVE_TRACE_SERVER_BASE_URL
      sources:
        - name: weave-trace
          type: service
          proto: "http"
          path: "/traces"
    - name: API_PATH_PREFIX
      value: "/traces"
    - name: WEAVE_ENABLE_ONLINE_EVAL
      value: "true"
    - name: WEAVE_ENABLE_AGENT_SCORING
      value: "false"
    - name: WEAVE_ENABLE_EVALUATE_MODEL_WORKER
      value: "true"
    - name: WANDB_INTERNAL_SERVICE_TOKEN
      sources:
        - name: weave-worker-auth
          type: generatedSecret
    - name: WANDB_INTERNAL_SERVICE_TOKEN_SECRET_NAME
      value: "weave-worker-auth"
  frontend:
    - name: REACT_APP_HOST
      source:
        - name: hostname
          type: custom-resource
          field: status.wandb.hostname
    - name: REACT_APP_ENVIRONMENT_NAME
      value: "local"
    - name: REACT_APP_ENVIRONMENT_IS_PRIVATE
      value: "true"
    - name: REACT_APP_ANALYTICS_DISABLED
      value: "true"
    - name: WEAVE_TRACES_ENABLED
      value: "true"
    - name: SERVER_FLAG_WEAVE_1_PERCENTAGE
      value: "100"
  flatRunsV2Producer:
    - name: KAFKA_RUNS_V2_TOPIC_NAME
      value: "flat-run-fields-updater"
    - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_ADDR
      value: "$(KAFKA_URL)/$(KAFKA_RUNS_V2_TOPIC_NAME)"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_CREATE_RUN_TABLES
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_CREATE_RUN_STORE
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_SHADOW_RUN_UPDATES
      value: "true"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_DISABLE_READS
      value: "false"
    - name: GORILLA_RUN_STORE_ONPREM_MIGRATE_FLAT_RUNS_MIGRATOR
      value: "true"
  flatRunsV2Consumer:
    - name: KAFKA_RUNS_V2_TOPIC_NAME
      value: "flat-run-fields-updater"
  telemetryOtel:
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      sources:
        - type: telemetry
          field: protocol
    - name: OTEL_TRACES_EXPORTER
      sources:
        - type: telemetry
          field: tracesExporter
    - name: OTEL_METRICS_EXPORTER
      sources:
        - type: telemetry
          field: metricsExporter
    - name: OTEL_LOGS_EXPORTER
      sources:
        - type: telemetry
          field: logsExporter
    - name: OTEL_EXPORTER_OTLP_METRICS_ENDPOINT
      sources:
        - type: telemetry
          field: metricsEndpoint
    - name: OTEL_EXPORTER_OTLP_LOGS_ENDPOINT
      sources:
        - type: telemetry
          field: logsEndpoint
    - name: OTEL_EXPORTER_OTLP_TRACES_ENDPOINT
      sources:
        - type: telemetry
          field: tracesEndpoint
    - name: OTEL_SERVICE_NAME
      sources:
        - type: telemetry
          field: serviceName
    - name: OTEL_RESOURCE_ATTRIBUTES
      sources:
        - type: telemetry
          field: resourceAttributes
    - name: GORILLA_TRACER
      sources:
        - type: telemetry
          field: gorillaTracer
commonVolumeMounts:
  internalSigner:
    - mountPath: /vol/env
      name: wandb-internal-signer-root
      source:
        name: wandb-internal-signer
        type: secret

applications:
  anaconda2:
    name: anaconda2
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/anaconda2
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: anaconda2
        ports:
          - containerPort: 8080
            name: anaconda2
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /ping
        readinessProbe:
          httpGet:
            path: /ping
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: anaconda2
  api:
    name: api
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaTaskQueueProducer
      - gorillaService
      - gorillaOnprem
      - gorillaCustomerSecrets
      - kafka
      - flatRunsV2Producer
    commonVolumeMounts:
      - internalSigner
    env:
      - name: GORILLA_LICENSE_CERT_PATH
        value: "/jwks.json"
      - name: GORILLA_VIEW_SPEC_UPDATER_EXECUTABLE
        value: "/view-spec-updater-linux"
      - name: INTERNAL_SIGNER_KEY_PATH
        value: "/vol/env"
      - name: MIGRATE_RUNS_DB
        sources:
          - name: default
            type: mysql
      - name: MIGRATE_USAGE_DB
        sources:
          - name: default
            type: mysql
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: api
        args:
          - gorilla
        ports:
          - containerPort: 8080
            name: api
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
        readinessProbe:
          httpGet:
            path: /ready
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: api
    ingress:
      paths:
        - /api
        - /artifacts
        - /artifactsV2
        - /files
        - /graphql
        - /graphql2
        - /oidc
      servicePort: "8080"
      pathType: Prefix
  executor:
    name: executor
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaTaskQueueConsumer
      - gorillaService
      - gorillaOnprem
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: executor
        args:
          - executor
  filemeta:
    name: filemeta
    args:
      - filemeta
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
  filestream:
    name: filestream
    features:
      - filestreamQueue
    args:
      - filestream
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: filestream
  flat-run-fields-updater:
    name: flat-run-fields-updater
    args:
      - flat-run-fields-updater
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - kafka
      - flatRunsV2Consumer
    env:
      - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_SUBSCRIPTIONS_FLAT_RUN_FIELDS_UPDATER
        value: "$(KAFKA_URL)/$(KAFKA_RUNS_V2_TOPIC_NAME)?consumer_group_id=flat-run-fields-updater"
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: flat-run-fields-updater
  frontend:
    name: frontend
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/frontend-nginx
      tag: 0.83.0-clickhouse-keeper.2
    commonEnvs:
      - frontend
    env:
      - name: FRONTEND_APP_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_AUTH_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_LOCAL_BACKEND
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: FRONTEND_WEAVE_BACKEND
        sources:
          - name: weave
            type: service
            proto: ""
            path: ""
      - name: WEAVE_ENABLED
        value: "true"
      - name: OPERATOR_ENABLED
        value: "true"
    containers:
      - name: frontend
        ports:
          - containerPort: 8080
            name: frontend
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
        readinessProbe:
          httpGet:
            path: /ready
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: frontend
    ingress:
      paths:
        - /
      servicePort: "8080"
      pathType: Prefix
    volumeMounts:
      - name: tmp
        mountPath: /tmp/
        source:
          type: emptyDir
          name: tmp
      - name: nginx-cache
        mountPath: /var/cache/nginx
        source:
          type: emptyDir
          name: nginx-cache
  glue:
    name: glue
    args:
      - glue
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaService
      - gorillaOnprem
    commonVolumeMounts:
      - internalSigner
    env:
      - name: GORILLA_LICENSE_CERT_PATH
        value: "/jwks.json"
      - name: GORILLA_VIEW_SPEC_UPDATER_EXECUTABLE
        value: "/view-spec-updater-linux"
      - name: GORILLA_GLUE_TASK_PROVIDER
        value: "memory://"
      - name: GORILLA_GLUE_TASK_CONFIG_PATH
        value: "/gorilla_glue_tasks_local.yaml"
      - name: GORILLA_GLUE_TASK_STORE
        value: "memory://"
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: glue
  metric-observer:
    name: metric-observer
    args:
      - metric-observer
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaService
      - gorillaOnprem
      - kafka
      - flatRunsV2Consumer
    env:
      - name: GORILLA_RUN_UPDATE_SHADOW_QUEUE_SUBSCRIPTIONS_METRIC_OBSERVER
        value: "$(KAFKA_URL)/$(KAFKA_RUNS_V2_TOPIC_NAME)?consumer_group_id=metric-observer"
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: metric-observer
  parquet:
    name: parquet
    args:
      - parquet
    commonEnvs:
      - gorillaMysql
      - gorillaBucket
      - gorillaRedis
      - gorillaHistoryStore
      - gorillaTaskQueueProducer
      - gorillaService
      - gorillaOnprem
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/megabinary
      tag: 0.83.0-clickhouse-keeper.2
    containers:
      - name: parquet
        ports:
          - containerPort: 8080
            name: parquet
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /healthz
        readinessProbe:
          httpGet:
            path: /ready
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: parquet
  weave:
    name: weave
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/weave-python
      tag: 0.83.0-clickhouse-keeper.2
    commonEnvs:
    env:
      - name: DATADOG_TRACE_ENABLED
        value: "false"
    service:
      ports:
        - port: 9239
          protocol: TCP
          name: weave
    ingress:
      paths:
        - /weave/
      servicePort: "9239"
      pathType: Prefix
    containers:
      - name: weave
        ports:
          - containerPort: 9239
            name: weave
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /__weave/hello
        readinessProbe:
          httpGet:
            path: /__weave/hello
      - name: weave-cache-clear
        command:
          - python
          - weave-public/weave_query/scripts/clear_cache.py
        resources:
          limits:
            cpu: 2
            memory: 2Gi
          requests:
            cpu: 100m
            memory: 128Mi
    volumeMounts:
      - name: temp-dir
        mountPath: /tmp/
        source:
          type: emptyDir
          name: temp-dir
      - name: cache
        mountPath: /vol/weave/cache
        source:
          type: emptyDir
          name: cache
  weave-trace:
    name: weave-trace
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/weave-trace
      tag: 0.83.0-clickhouse-keeper.2
    commonEnvs:
      - clickhouse
      - kafka
      - weaveTrace
    containers:
      - name: weave-trace
        args:
          - "uvicorn"
          - "src.trace_server:app"
          - "--host"
          - "0.0.0.0"
          - "--port"
          - "8080"
        ports:
          - containerPort: 8080
            name: weave-trace
            protocol: TCP
        livenessProbe:
          httpGet:
            path: /traces/health
        readinessProbe:
          httpGet:
            path: /traces/health
    service:
      ports:
        - port: 8080
          protocol: TCP
          name: weave-trace
    ingress:
      paths:
        - /traces
      servicePort: "8080"
      pathType: Prefix
    jwtTokens:
      - name: internal-jwt
        mountPath: /tmp/weave-trace/internal-jwt
        source:
          kubernetesServiceAccount:
            audience: internal-service
            expirationSeconds: 600
  weave-trace-worker:
    name: weave-trace-worker
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/weave-trace
      tag: 0.83.0-clickhouse-keeper.2
    env:
      - name: DD_TRACE_ENABLED
        value: "false"
    commonEnvs:
      - clickhouse
      - kafka
      - weaveTrace
    containers:
      - name: weave-trace-worker
        args:
          - "python"
          - "-m"
          - "src.workers.scoring_worker"
  weave-trace-evaluate-model-worker:
    name: weave-trace-evaluate-model-worker
    legacyKey: weave-evaluate-model-worker
    image:
      repository: us-docker.pkg.dev/wandb-production/public/wandb/weave-trace
      tag: 0.83.0-clickhouse-keeper.2
    env:
      - name: DD_TRACE_ENABLED
        value: "false"
    commonEnvs:
      - clickhouse
      - kafka
      - weaveTrace
    containers:
      - name: weave-trace-evaluate-model-worker
        args:
          - "python"
          - "-m"
          - "src.workers.evaluate_model_worker.evaluate_model_worker"
  nginx-proxy:
    name: nginx-proxy
    legacyKey: nginx
    features:
      - proxy
    image:
      repository: nginxinc/nginx-unprivileged
      tag: latest
    commonEnvs:
    env:
      - name: UPSTREAM_FRONTEND
        sources:
          - name: frontend
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_API
        sources:
          - name: api
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_WEAVE_TRACE
        sources:
          - name: weave-trace
            type: service
            proto: ""
            path: ""
      - name: UPSTREAM_WEAVE
        sources:
          - name: weave
            type: service
            proto: ""
            path: ""
      - name: BUCKET_HOST
        sources:
          - name: default
            type: bucket
            field: host
      - name: BUCKET_PORT
        sources:
          - name: default
            type: bucket
            field: port
      - name: UPSTREAM_BUCKET
        value: "$(BUCKET_HOST):$(BUCKET_PORT)"
    files:
      - name: envvar.conf.template
        mountPath: /etc/nginx/templates
        fileName: envvar.conf.template
        inline: |
          upstream frontend {
            server $UPSTREAM_FRONTEND;
          }

          upstream api {
            server $UPSTREAM_API;
          }

          upstream weave_trace {
            server $UPSTREAM_WEAVE_TRACE;
          }

          upstream weave {
            server $UPSTREAM_WEAVE;
          }

          upstream bucket {
            server $UPSTREAM_BUCKET;
          }

          map $host $bucket{
            default $UPSTREAM_BUCKET;
          }
      - name: nginx.conf
        mountPath: /etc/nginx
        fileName: nginx.conf
        inline: |
          worker_processes  auto;

          error_log  /var/log/nginx/error.log notice;
          pid        /tmp/nginx.pid;

          events {
            worker_connections  1024;
          }

          http {

            include /etc/nginx/conf.d/envvar.conf;

            server {
              listen 8080;
              proxy_set_header Host $http_host;
              client_max_body_size 0;
              location / {
                proxy_pass http://frontend;
              }

              location /api {
                proxy_pass http://api;
              }
              location /artifacts {
                proxy_pass http://api;
              }
              location /artifactsV2 {
                proxy_pass http://api;
              }

              location /files {
                proxy_pass http://api;
              }

              location /graphql {
                proxy_pass http://api;
              }

              location /graphql2 {
                proxy_pass http://api;
              }

              location /oidc {
                proxy_pass http://api;
              }

              location /traces {
                proxy_pass http://weave_trace;
              }

              location /weave/ {
                proxy_pass http://weave/;
              }

              location /bucket {
                proxy_ssl_verify off;
                proxy_set_header Host $bucket;
                proxy_pass https://bucket;
              }
            }
          }
    service:
      type: NodePort
      ports:
        - name: http
          port: 8080
          protocol: TCP

