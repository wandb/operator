# Keeper coordinates ReplicatedMergeTree replication; it stores only the Raft
# log + metadata snapshots, so its volume is small and independent of CH data.
# replicas must be odd (Raft quorum): 1 for single-node, 3 for replicated CH.
clickhouseKeeper:
  default:
    sizing:
      default:
        replicas: 1
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 1Gi
      micro:
        replicas: 3
        volumeSize: 10Gi
        resources:
          requests:
            cpu: 500m
            memory: 1Gi
          limits:
            cpu: 500m
            memory: 1Gi
      small:
        replicas: 3
        volumeSize: 20Gi
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 1
            memory: 2Gi
      medium:
        replicas: 3
        volumeSize: 20Gi
        resources:
          requests:
            cpu: 1
            memory: 2Gi
          limits:
            cpu: 1
            memory: 2Gi
      large:
        replicas: 3
        volumeSize: 20Gi
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 2
            memory: 4Gi
      xlarge:
        replicas: 3
        volumeSize: 20Gi
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 2
            memory: 4Gi
      2xlarge:
        replicas: 3
        volumeSize: 20Gi
        resources:
          requests:
            cpu: 2
            memory: 4Gi
          limits:
            cpu: 2
            memory: 4Gi
kafka:
  sizing:
    # Bufstream brokers are stateless; replicas = broker count (floored at 2), volumeSize = etcd metadata PVC, replicationFactor = topic RF (1 for object-store backed).
    default:
      replicas: 2
      volumeSize: 10Gi
      replicationFactor: 1
    micro:
      replicas: 2
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 1
          memory: 4Gi
        limits:
          cpu: 1
          memory: 4Gi
    small:
      replicas: 2
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 2
          memory: 8Gi
        limits:
          cpu: 2
          memory: 8Gi
    medium:
      replicas: 3
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 4
          memory: 16Gi
        limits:
          cpu: 4
          memory: 16Gi
    large:
      replicas: 3
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 8
          memory: 30Gi
        limits:
          cpu: 8
          memory: 30Gi
    xlarge:
      replicas: 4
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 8
          memory: 30Gi
        limits:
          cpu: 8
          memory: 30Gi
    2xlarge:
      replicas: 6
      volumeSize: 10Gi
      replicationFactor: 1
      resources:
        requests:
          cpu: 8
          memory: 30Gi
        limits:
          cpu: 8
          memory: 30Gi
