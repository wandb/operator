apiVersion: apps.wandb.com/v2
kind: WeightsAndBiases
metadata:
  name: wandb
spec:
  objectStore:
    managedObjectStore: null
    externalObjectStore:
      # provider selects the backend: s3 (default), gcs, or azure.
      #   gcs:   set bucket (gs://<bucket>); creds via workload identity or
      #          accessKey (SA email) + secretKey (PEM key).
      #   azure: set accessKey (storage account), bucket (container), and
      #          secretKey (account key) -> az://<account>/<container>.
      provider: s3
      # required
      endpoint:
        name: external-objectstore-connection
        key: Host
      port:
        name: external-objectstore-connection
        key: Port
      bucket:
        name: external-objectstore-connection
        key: Bucket
      region:
        name: external-objectstore-connection
        key: Region
      URL:
        name: external-objectstore-connection
        key: url
      accessKey:
        name: external-objectstore-connection
        key: AccessKey
      secretKey:
        name: external-objectstore-connection
        key: SecretKey
